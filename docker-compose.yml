name: chronosgrid

x-backend-env: &backend-env
  DATABASE_URL: postgresql+asyncpg://chronos:chronos@postgres:5432/chronosgrid
  REDIS_URL: redis://redis:6379/0
  JWT_SECRET: ${JWT_SECRET:-dev-only-change-me}
  SEED_DEMO_DATA: "1"
  ENVIRONMENT: docker
  CORS_ORIGINS: http://localhost:3000,http://localhost:5173

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: chronos
      POSTGRES_PASSWORD: chronos
      POSTGRES_DB: chronosgrid
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chronos -d chronosgrid"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

  api:
    build: ./backend
    entrypoint: ["/app/entrypoint-api.sh"]
    environment:
      <<: *backend-env
      EMBEDDED_SCHEDULER: "0"     # dedicated scheduler container below
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request;urllib.request.urlopen('http://localhost:8000/api/v1/ready')\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  scheduler:
    build: ./backend
    command: ["python", "scheduler_main.py"]
    environment:
      <<: *backend-env
      SEED_DEMO_DATA: "0"
    depends_on:
      api:
        condition: service_healthy

  worker:
    build: ./backend
    command: ["python", "worker_main.py"]
    environment:
      <<: *backend-env
      SEED_DEMO_DATA: "0"
      WORKER_CAPACITY: "5"
      WORKER_TAGS: general
    deploy:
      replicas: 2              # scale further: docker compose up --scale worker=4
    depends_on:
      api:
        condition: service_healthy
    stop_grace_period: 45s     # allow graceful drain of running jobs

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
