name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: chronos
          POSTGRES_PASSWORD: chronos
          POSTGRES_DB: chronosgrid_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U chronos"
          --health-interval 5s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Run migrations against clean PostgreSQL
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://chronos:chronos@localhost:5432/chronosgrid_test
        run: python -m alembic upgrade head
      - name: Run tests on SQLite (fast path)
        working-directory: backend
        run: python -m pytest -q
      - name: Run tests on PostgreSQL (integration incl. SKIP LOCKED claims)
        working-directory: backend
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://chronos:chronos@localhost:5432/chronosgrid_test
        run: python -m pytest -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install
        working-directory: frontend
        run: npm install --no-audit --no-fund
      - name: Type check + build
        working-directory: frontend
        run: npm run build
      - name: Component tests
        working-directory: frontend
        run: npm test

  e2e:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Start full stack
        run: docker compose up --build -d
      - name: Wait for readiness
        run: |
          for i in $(seq 1 60); do
            curl -fsS http://localhost:8000/api/v1/ready && break || sleep 2
          done
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Run Playwright tests
        working-directory: frontend
        env:
          E2E_BASE_URL: http://localhost:3000
        run: |
          npm install --no-audit --no-fund
          npx playwright install --with-deps chromium
          npx playwright test
      - name: Compose logs on failure
        if: failure()
        run: docker compose logs --tail 200
