services:
  - type: web
    name: chronosgrid-api
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerCommand: sh /app/entrypoint-render.sh
    healthCheckPath: /api/v1/ready
    envVars:
      - key: DATABASE_URL
        value: sqlite+aiosqlite:////tmp/chronosgrid.db
      - key: EMBEDDED_SCHEDULER
        value: "1"
      - key: SEED_DEMO_DATA
        value: "1"
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: https://kaniska03.github.io
      - key: WORKER_CAPACITY
        value: "5"
      - key: WORKER_TAGS
        value: general
      - key: ENVIRONMENT
        value: production
